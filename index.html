<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoKaraokê - Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(31, 40, 51, 0.7);
            --primary-color: #66fcf1;
            --primary-hover: #45a29e;
            --text-main: #c5c6c7;
            --text-light: #ffffff;
            --glass-border: rgba(102, 252, 241, 0.2);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at top right, rgba(69, 162, 158, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(102, 252, 241, 0.05), transparent 40%);
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
            margin-bottom: 1rem;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        main {
            flex: 1;
            padding: 2rem 1rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        #songList {
            display: grid;
            gap: 1rem;
        }

        .song-card {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .song-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border-color: var(--glass-border);
        }

        .song-info h3 {
            color: var(--text-light);
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
        }

        .song-info p {
            font-size: 0.9rem;
            color: var(--text-main);
        }
        
        .song-code {
            display: inline-block;
            background: rgba(102, 252, 241, 0.1);
            color: var(--primary-color);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .btn-pedir {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-pedir:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        /* Modal Details */
        #modalOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1f2833;
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.1);
            text-align: center;
            position: relative;
        }

        .modal-content h2 {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .modal-content input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: inherit;
            font-size: 1rem;
        }

        .modal-content input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-submit {
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.6);
            transform: translateY(-2px);
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-modal:hover { color: var(--text-light); }

        #loadingMsg {
            display: none;
            color: var(--primary-color);
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>NeoKaraokê</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar por música ou artista..." autocomplete="off">
        </div>
    </header>

    <main>
        <div id="songList">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- Modal -->
    <div id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2>Fazer Pedido</h2>
            <p id="modalSongInfo" style="margin-bottom: 1rem; color: var(--primary-color);"></p>
            <input type="text" id="cantorNome" placeholder="Seu Nome / Apelido" required>
            <button class="btn-submit" onclick="submitRequest()">ENVIAR PEDIDO</button>
            <p id="loadingMsg">Enviando pedido, aguarde...</p>
        </div>
    </div>

    <script>
        // === CONFIGURAÇÃO IMPRESCINDÍVEL ===
        // Cole aqui a URL gerada pelo Google Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiVkm1a74NElAiiHztVJ8xVh_KkoQiJ9quZ6qHB7ve3_p7sGKOv0IIImhgwPZHHTNP/exec';
        
        let musicCache = [];
        let currentSong = null;
        let displayLimit = 500;
        let isShowingFullList = false;

        // Load JSON data
        async function loadData() {
            try {
                const response = await fetch('musicas.json');
                const data = await response.json();
                
                // Se veio no formato de dados.json (possui "lista")
                if (data.lista) {
                    musicCache = data.lista;
                } else {
                    musicCache = data; // Formato antigo array de objetos
                }
                renderList(musicCache);
            } catch (error) {
                console.error("Erro ao carregar lista de músicas:", error);
                document.getElementById('songList').innerHTML = '<p style="text-align:center;color:red;">Erro ao carregar arquivo musicas.json. Certifique-se de que ele existe na mesma pasta.</p>';
            }
        }

        // Render List
        function renderList(list) {
            const container = document.getElementById('songList');
            container.innerHTML = '';
            
            const term = document.getElementById('searchInput').value.trim();
            
            // Oculta a lista inicial e mostra apenas o botão de lista completa
            if (!term && !isShowingFullList) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 2rem;">
                        <p style="margin-bottom: 1.5rem; color: var(--text-main); font-size: 1.1rem;">Pesquise uma música na barra acima ou navegue por todas as músicas.</p>
                        <button class="btn-submit" onclick="showFullList()" style="width:auto; padding: 1rem 2rem;">VER LISTA COMPLETA</button>
                    </div>
                `;
                return;
            }
            
            // Limit output
            const limitedList = list.slice(0, displayLimit);

            if (limitedList.length === 0) {
                container.innerHTML = '<p style="text-align:center; margin-top: 2rem;">Nenhuma música encontrada.</p>';
                return;
            }

            limitedList.forEach((song, index) => {
                let artista = "Canção";
                let titulo = "Desconhecido";
                let originalStr = "";
                
                if (typeof song === 'string') {
                    originalStr = song;
                    const partes = song.split(" - ");
                    if (partes.length >= 2) {
                        artista = partes[0].trim();
                        titulo = partes.slice(1).join(" - ").trim();
                    } else {
                        titulo = song.trim();
                    }
                } else {
                    artista = song.artista || "Canção";
                    titulo = song.titulo || "Desconhecido";
                    originalStr = song.codigo || (artista + " - " + titulo);
                }

                const card = document.createElement('div');
                card.className = 'song-card';
                card.style.animationDelay = `${(index % 50) * 0.02}s`;
                card.innerHTML = `
                    <div class="song-info">
                        <h3>${titulo}</h3>
                        <p>${artista}</p>
                    </div>
                    <button class="btn-pedir" onclick='openModal(${JSON.stringify({artista: artista, titulo: titulo, codigo: originalStr})})'>Pedir</button>
                `;
                container.appendChild(card);
            });
            
            // Paginação / Carregar mais
            if (list.length > displayLimit) {
                const loadContainer = document.createElement('div');
                loadContainer.style.textAlign = 'center';
                loadContainer.style.marginTop = '2rem';
                
                const loadMoreBtn = document.createElement('button');
                loadMoreBtn.className = 'btn-submit';
                loadMoreBtn.style.width = 'auto';
                loadMoreBtn.style.padding = '1rem 3rem';
                loadMoreBtn.innerText = 'CARREGAR MAIS';
                
                // Variável local para injetar estado de busca ou não
                loadMoreBtn.onclick = () => {
                    displayLimit += 500;
                    renderList(list);
                };
                
                loadContainer.appendChild(loadMoreBtn);
                container.appendChild(loadContainer);
            }
        }
        
        // Functions for full list
        window.showFullList = function() {
            isShowingFullList = true;
            displayLimit = 500;
            document.getElementById('searchInput').value = '';
            renderList(musicCache);
        };

        // Search logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            isShowingFullList = false;
            displayLimit = 500; // Reset limite na busca
            
            const term = e.target.value.toLowerCase();
            
            if (!term) {
                renderList(musicCache); // Sem termo e não mostrando full list = mostra botão
                return;
            }
            
            const filtered = musicCache.filter(m => {
                if (typeof m === 'string') {
                    return m.toLowerCase().includes(term);
                } else {
                    return (m.titulo || "").toLowerCase().includes(term) || 
                           (m.artista || "").toLowerCase().includes(term) ||
                           (m.codigo || "").toLowerCase().includes(term);
                }
            });
            renderList(filtered);
        });

        // Modal functions
        function openModal(song) {
            currentSong = song;
            document.getElementById('modalSongInfo').innerText = `${song.titulo} - ${song.artista}`;
            document.getElementById('cantorNome').value = '';
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('loadingMsg').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function submitRequest() {
            const nome = document.getElementById('cantorNome').value.trim();
            if (!nome) {
                alert("Por favor, digite seu nome.");
                return;
            }

            if (SCRIPT_URL === 'COLE_AQUI_A_SUA_URL_DO_APPS_SCRIPT') {
                alert("O administrador ainda não configurou a URL do sistema (Google Apps Script).");
                return;
            }

            document.getElementById('loadingMsg').style.display = 'block';

            const payload = {
                nome: nome,
                musica: currentSong.titulo,
                artista: currentSong.artista,
                codigo: currentSong.codigo
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if (result.status === "Sucesso") {
                    alert("Seu pedido foi enviado para a fila do Karaokê! Boa sorte!");
                    closeModal();
                } else {
                    alert("Ocorreu um erro: " + result.message);
                }
            } catch (error) {
                console.error("Erro no envio:", error);
                alert("Não foi possível enviar o pedido. Tente novamente ou chame o administrador. O erro indica um problema de CORS ou rede.");
            } finally {
                document.getElementById('loadingMsg').style.display = 'none';
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
